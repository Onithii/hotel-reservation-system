<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Luxury - Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styles specifically for handling management data tables */
        .admin-container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: var(--primary);
            color: white;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-checkedout { background: #e2e3e5; color: #383d41; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            margin-right: 5px;
            width: auto;
            display: inline-block;
        }
        .btn-checkout { background-color: #2980b9; }
        .btn-cancel { background-color: #e67e22; }
        .btn-delete { background-color: #c0392b; }
        .btn-checkout:hover { background-color: #1f618d; }
        .btn-cancel:hover { background-color: #d35400; }
        .btn-delete:hover { background-color: #962d22; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Hotel Management Dashboard</h2>
    <p>Logged in as: <strong>FrontDesk Receptionist / Admin</strong></p>

    <button type="button" class="btn-refresh" id="loadReservationsBtn">🔄 Refresh Master Booking List</button>

    <table id="reservationsTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Guest Name</th>
            <th>Room</th>
            <th>Check-In</th>
            <th>Check-Out</th>
            <th>Total Price</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="reservationsBody">
        <tr>
            <td colspan="8" style="text-align: center; color: #888;">Click the button above to load active database rows.</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="admin.js"></script>
</body>
</html>
